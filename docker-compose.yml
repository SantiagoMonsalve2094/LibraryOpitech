services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: LibraryOpiSqlServer
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LibraryOpi123*"
      SA_PASSWORD: "LibraryOpi123*"
    ports:
      - "14330:1433"
    volumes:
      - libraryopi_sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"LibraryOpi123*\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"LibraryOpi123*\" -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: LibraryOpi
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=LibraryOpitechDb;User Id=sa;Password=LibraryOpi123*;TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: LibraryOpitech
      Jwt__Audience: LibraryOpitech
      Jwt__Secret: LibraryOpitech-Mvp-Secret-Key-For-Jwt-Development-Only
      Jwt__ExpirationHours: 8
    ports:
      - "8081:8080"

volumes:
  libraryopi_sql_data:
